server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: pharmaprocure-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:pharmaprocure}
    username: ${DB_USERNAME:pharmaprocure}
    password: ${DB_PASSWORD:pharmaprocure}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

application:
  version: 0.6.0-phase6
  document:
    storage-root: /app/data/documents
    signature-key-path: /app/data/keys/document-signing.key
